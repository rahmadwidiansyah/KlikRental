services:
  # --- SERVICE DATABASE (MYSQL) ---
  db:
    image: mysql:8.0
    container_name: klikrental_db_dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-klikrental}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306" # Diekspos agar kamu bisa akses database pakai DBeaver/HeidiSQL
    volumes:
      - db_data_dev:/var/lib/mysql
    networks:
      - klikrental_net

  # --- SERVICE LARAVEL APP (APACHE + PHP 8.4) ---
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: klikrental_app_dev
    restart: unless-stopped
    ports:
      - "4050:80"    # Port web server lokal
      - "5173:5173"  # Port Vite untuk Hot Module Replacement (HMR)
    volumes:
      - .:/var/www   # INI YANG PALING PENTING: Sync kodemu langsung ke container
    depends_on:
      - db
    networks:
      - klikrental_net

# --- KONFIGURASI NETWORK ---
networks:
  klikrental_net:
    driver: bridge

# --- PERSISTENT STORAGE ---
volumes:
  db_data_dev: